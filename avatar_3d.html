<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sovereign AI — 3D Avatar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #000814;
    font-family: 'Segoe UI', system-ui, sans-serif;
    cursor: default;
  }
  #canvas-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  /* Status HUD */
  #hud {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    text-align: center;
  }
  #hud .title {
    font-size: 14px;
    letter-spacing: 6px;
    color: #00ffffaa;
    text-transform: uppercase;
    font-weight: 300;
  }
  #hud .status {
    font-size: 11px;
    letter-spacing: 3px;
    margin-top: 4px;
    transition: color 0.5s;
  }
  .state-idle .status { color: #00ffff88; }
  .state-thinking .status { color: #ffd70088; }
  .state-talking .status { color: #ff66ff88; }

  /* Bottom bar */
  #bottom-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 100;
  }
  #bottom-bar button {
    background: rgba(0, 255, 255, 0.08);
    border: 1px solid rgba(0, 255, 255, 0.2);
    color: #00ffffaa;
    padding: 8px 20px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.3s;
  }
  #bottom-bar button:hover {
    background: rgba(0, 255, 255, 0.15);
    border-color: #00ffff;
    color: #00ffff;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
  }
  #bottom-bar button.active {
    background: rgba(0, 255, 255, 0.2);
    border-color: #00ffff;
    color: #00ffff;
  }

  /* Audio visualizer */
  #visualizer {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 40px;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #visualizer.active { opacity: 1; }
  .viz-bar {
    width: 3px;
    background: linear-gradient(to top, #ff66ff, #00ffff);
    border-radius: 2px;
    transition: height 0.1s;
  }
</style>
</head>
<body class="state-idle">

<div id="canvas-container"></div>

<div id="hud">
  <div class="title">Sovereign Intelligence</div>
  <div class="status" id="status-text">● ONLINE</div>
</div>

<div id="visualizer"></div>

<div id="bottom-bar">
  <button onclick="setState('idle')" id="btn-idle" class="active">Idle</button>
  <button onclick="setState('thinking')" id="btn-think">Think</button>
  <button onclick="setState('talking')" id="btn-talk">Talk</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ========================================
//  SOVEREIGN 3D AVATAR ENGINE
// ========================================

let scene, camera, renderer, clock;
let avatar, headGroup, bodyGroup, platformGroup;
let particles, auraRing, neuralWeb;
let currentState = 'idle';
let time = 0;

// Color palette
const COLORS = {
  cyan: new THREE.Color(0x00ffff),
  magenta: new THREE.Color(0xff66ff),
  gold: new THREE.Color(0xffd700),
  purple: new THREE.Color(0x8b5cf6),
  darkBg: new THREE.Color(0x000814),
  white: new THREE.Color(0xffffff),
};

function init() {
  clock = new THREE.Clock();

  // Scene
  scene = new THREE.Scene();
  scene.background = COLORS.darkBg;
  scene.fog = new THREE.FogExp2(0x000814, 0.015);

  // Camera
  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 8);
  camera.lookAt(0, 1.5, 0);

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x112244, 0.5);
  scene.add(ambientLight);

  const mainLight = new THREE.DirectionalLight(0x00ffff, 0.8);
  mainLight.position.set(5, 10, 5);
  mainLight.castShadow = true;
  scene.add(mainLight);

  const fillLight = new THREE.DirectionalLight(0xff66ff, 0.4);
  fillLight.position.set(-5, 5, -5);
  scene.add(fillLight);

  const rimLight = new THREE.PointLight(0x00ffff, 1.5, 15);
  rimLight.position.set(0, 5, -3);
  scene.add(rimLight);

  // Build avatar
  avatar = new THREE.Group();
  buildAvatar();
  scene.add(avatar);

  // Platform
  buildPlatform();

  // Particles
  buildParticles();

  // Neural web
  buildNeuralWeb();

  // Grid floor
  buildGridFloor();

  // Audio visualizer bars
  buildVisualizer();

  // Events
  window.addEventListener('resize', onResize);
  
  // Listen for state commands via URL hash
  window.addEventListener('hashchange', () => {
    const hash = window.location.hash.slice(1);
    if (['idle', 'thinking', 'talking', 'active'].includes(hash)) {
      setState(hash === 'active' ? 'thinking' : hash);
    }
  });

  // Start
  animate();
}

// ========================================
//  AVATAR CONSTRUCTION
// ========================================
function buildAvatar() {
  headGroup = new THREE.Group();
  bodyGroup = new THREE.Group();

  // --- HEAD ---
  const headGeo = new THREE.SphereGeometry(0.45, 32, 32);
  const headMat = new THREE.MeshPhysicalMaterial({
    color: 0x1a1a2e,
    metalness: 0.9,
    roughness: 0.15,
    clearcoat: 1.0,
    clearcoatRoughness: 0.1,
    emissive: 0x0a0a1a,
    emissiveIntensity: 0.3,
  });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 3.5;
  head.scale.set(1, 1.1, 0.95);
  headGroup.add(head);

  // Face plate / visor
  const visorGeo = new THREE.SphereGeometry(0.35, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.5);
  const visorMat = new THREE.MeshPhysicalMaterial({
    color: 0x000022,
    metalness: 1.0,
    roughness: 0.0,
    clearcoat: 1.0,
    transparent: true,
    opacity: 0.7,
    emissive: 0x00ffff,
    emissiveIntensity: 0.2,
  });
  const visor = new THREE.Mesh(visorGeo, visorMat);
  visor.position.set(0, 3.55, 0.15);
  visor.rotation.x = -Math.PI * 0.15;
  headGroup.add(visor);

  // Eyes (glowing)
  const eyeGeo = new THREE.SphereGeometry(0.06, 16, 16);
  const eyeMatL = new THREE.MeshBasicMaterial({ color: 0x00ffff });
  const eyeMatR = new THREE.MeshBasicMaterial({ color: 0xff66ff });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMatL);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMatR);
  eyeL.position.set(-0.14, 3.55, 0.38);
  eyeR.position.set(0.14, 3.55, 0.38);
  headGroup.add(eyeL, eyeR);

  // Eye glow
  const eyeGlowGeo = new THREE.SphereGeometry(0.1, 8, 8);
  const glowMatL = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.15 });
  const glowMatR = new THREE.MeshBasicMaterial({ color: 0xff66ff, transparent: true, opacity: 0.15 });
  const glowL = new THREE.Mesh(eyeGlowGeo, glowMatL);
  const glowR = new THREE.Mesh(eyeGlowGeo, glowMatR);
  glowL.position.copy(eyeL.position);
  glowR.position.copy(eyeR.position);
  headGroup.add(glowL, glowR);

  // --- NECK ---
  const neckGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.3, 16);
  const neckMat = new THREE.MeshPhysicalMaterial({
    color: 0x1a1a2e,
    metalness: 0.8,
    roughness: 0.2,
    emissive: 0x00ffff,
    emissiveIntensity: 0.1,
  });
  const neck = new THREE.Mesh(neckGeo, neckMat);
  neck.position.y = 3.1;
  bodyGroup.add(neck);

  // --- TORSO ---
  const torsoGeo = new THREE.CylinderGeometry(0.35, 0.25, 1.2, 8);
  const torsoMat = new THREE.MeshPhysicalMaterial({
    color: 0x12122a,
    metalness: 0.85,
    roughness: 0.2,
    clearcoat: 0.8,
    emissive: 0x0a0a20,
    emissiveIntensity: 0.2,
  });
  const torso = new THREE.Mesh(torsoGeo, torsoMat);
  torso.position.y = 2.35;
  bodyGroup.add(torso);

  // Chest light core
  const coreGeo = new THREE.SphereGeometry(0.08, 16, 16);
  const coreMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
  const core = new THREE.Mesh(coreGeo, coreMat);
  core.position.set(0, 2.6, 0.3);
  core.name = 'core';
  bodyGroup.add(core);

  // Core glow
  const coreGlowGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const coreGlowMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.12 });
  const coreGlow = new THREE.Mesh(coreGlowGeo, coreGlowMat);
  coreGlow.position.copy(core.position);
  coreGlow.name = 'coreGlow';
  bodyGroup.add(coreGlow);

  // Neon circuit lines on torso
  addCircuitLines(bodyGroup);

  // --- ARMS ---
  const armGeo = new THREE.CylinderGeometry(0.07, 0.05, 1.0, 8);
  const armMat = torsoMat.clone();
  
  const armL = new THREE.Mesh(armGeo, armMat);
  armL.position.set(-0.45, 2.3, 0);
  armL.rotation.z = 0.15;
  armL.name = 'armL';
  bodyGroup.add(armL);

  const armR = new THREE.Mesh(armGeo, armMat);
  armR.position.set(0.45, 2.3, 0);
  armR.rotation.z = -0.15;
  armR.name = 'armR';
  bodyGroup.add(armR);

  // Forearms
  const forearmGeo = new THREE.CylinderGeometry(0.05, 0.04, 0.8, 8);
  const forearmL = new THREE.Mesh(forearmGeo, armMat);
  forearmL.position.set(-0.5, 1.65, 0.1);
  forearmL.rotation.z = 0.1;
  forearmL.rotation.x = -0.2;
  forearmL.name = 'forearmL';
  bodyGroup.add(forearmL);

  const forearmR = new THREE.Mesh(forearmGeo, armMat);
  forearmR.position.set(0.5, 1.65, 0.1);
  forearmR.rotation.z = -0.1;
  forearmR.rotation.x = -0.2;
  forearmR.name = 'forearmR';
  bodyGroup.add(forearmR);

  // --- LEGS ---
  const legGeo = new THREE.CylinderGeometry(0.1, 0.07, 1.2, 8);
  const legL = new THREE.Mesh(legGeo, armMat);
  legL.position.set(-0.15, 1.05, 0);
  bodyGroup.add(legL);

  const legR = new THREE.Mesh(legGeo, armMat);
  legR.position.set(0.15, 1.05, 0);
  bodyGroup.add(legR);

  // Shin guards (accent)
  const shinGeo = new THREE.CylinderGeometry(0.085, 0.06, 0.5, 6);
  const shinMat = new THREE.MeshPhysicalMaterial({
    color: 0x1a1a3e,
    metalness: 0.9,
    roughness: 0.1,
    emissive: 0xff66ff,
    emissiveIntensity: 0.15,
  });
  const shinL = new THREE.Mesh(shinGeo, shinMat);
  shinL.position.set(-0.15, 0.75, 0.02);
  bodyGroup.add(shinL);

  const shinR = new THREE.Mesh(shinGeo, shinMat);
  shinR.position.set(0.15, 0.75, 0.02);
  bodyGroup.add(shinR);

  // --- SHOULDER PADS ---
  const shoulderGeo = new THREE.SphereGeometry(0.12, 16, 16);
  const shoulderMat = new THREE.MeshPhysicalMaterial({
    color: 0x1a1a3e,
    metalness: 0.9,
    roughness: 0.1,
    emissive: 0x00ffff,
    emissiveIntensity: 0.2,
  });
  const shoulderL = new THREE.Mesh(shoulderGeo, shoulderMat);
  shoulderL.position.set(-0.45, 2.85, 0);
  shoulderL.scale.set(1.3, 0.8, 1);
  bodyGroup.add(shoulderL);

  const shoulderR = new THREE.Mesh(shoulderGeo, shoulderMat);
  shoulderR.position.set(0.45, 2.85, 0);
  shoulderR.scale.set(1.3, 0.8, 1);
  bodyGroup.add(shoulderR);

  // Aura ring around body
  const auraGeo = new THREE.TorusGeometry(0.8, 0.015, 8, 64);
  const auraMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    transparent: true,
    opacity: 0.3,
  });
  auraRing = new THREE.Mesh(auraGeo, auraMat);
  auraRing.position.y = 2.5;
  auraRing.rotation.x = Math.PI * 0.5;
  bodyGroup.add(auraRing);

  // Second aura ring (counter-rotating)
  const aura2 = new THREE.Mesh(
    new THREE.TorusGeometry(1.0, 0.01, 8, 64),
    new THREE.MeshBasicMaterial({ color: 0xff66ff, transparent: true, opacity: 0.2 })
  );
  aura2.position.y = 2.5;
  aura2.rotation.x = Math.PI * 0.4;
  aura2.name = 'aura2';
  bodyGroup.add(aura2);

  avatar.add(headGroup);
  avatar.add(bodyGroup);
}

function addCircuitLines(group) {
  const lineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.4 });
  
  // Vertical circuit lines
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const x = Math.cos(angle) * 0.28;
    const z = Math.sin(angle) * 0.28;
    
    const points = [];
    for (let j = 0; j < 6; j++) {
      const y = 1.8 + j * 0.2;
      const offsetX = (Math.random() - 0.5) * 0.05;
      points.push(new THREE.Vector3(x + offsetX, y, z));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geo, lineMat);
    group.add(line);
  }
}

// ========================================
//  PLATFORM
// ========================================
function buildPlatform() {
  platformGroup = new THREE.Group();

  // Main disc
  const discGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.05, 64);
  const discMat = new THREE.MeshPhysicalMaterial({
    color: 0x0a0a1e,
    metalness: 0.95,
    roughness: 0.1,
    emissive: 0x00ffff,
    emissiveIntensity: 0.05,
    clearcoat: 1,
  });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.y = 0.35;
  disc.receiveShadow = true;
  platformGroup.add(disc);

  // Platform rings
  for (let i = 0; i < 3; i++) {
    const ringGeo = new THREE.TorusGeometry(0.5 + i * 0.35, 0.008, 8, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: i === 1 ? 0xff66ff : 0x00ffff,
      transparent: true,
      opacity: 0.4 - i * 0.1,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = 0.38;
    ring.rotation.x = Math.PI * 0.5;
    ring.name = `platformRing${i}`;
    platformGroup.add(ring);
  }

  scene.add(platformGroup);
}

// ========================================
//  PARTICLE SYSTEM
// ========================================
function buildParticles() {
  const count = 500;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    const r = 2 + Math.random() * 6;

    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = Math.random() * 6;
    positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);

    const c = Math.random() > 0.5 ? COLORS.cyan : COLORS.magenta;
    colors[i * 3] = c.r;
    colors[i * 3 + 1] = c.g;
    colors[i * 3 + 2] = c.b;

    sizes[i] = Math.random() * 3 + 1;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    size: 0.04,
    vertexColors: true,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  particles = new THREE.Points(geo, mat);
  scene.add(particles);
}

// ========================================
//  NEURAL WEB (floating connections)
// ========================================
function buildNeuralWeb() {
  neuralWeb = new THREE.Group();
  const nodeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3 });
  const nodeGeo = new THREE.SphereGeometry(0.03, 8, 8);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.1 });

  const nodes = [];
  for (let i = 0; i < 20; i++) {
    const node = new THREE.Mesh(nodeGeo, nodeMat);
    node.position.set(
      (Math.random() - 0.5) * 4,
      1 + Math.random() * 4,
      (Math.random() - 0.5) * 4
    );
    neuralWeb.add(node);
    nodes.push(node);
  }

  // Connect nearby nodes
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      if (nodes[i].position.distanceTo(nodes[j].position) < 2.5) {
        const points = [nodes[i].position, nodes[j].position];
        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(lineGeo, lineMat);
        neuralWeb.add(line);
      }
    }
  }

  scene.add(neuralWeb);
}

// ========================================
//  GRID FLOOR
// ========================================
function buildGridFloor() {
  const gridHelper = new THREE.GridHelper(40, 40, 0x00ffff, 0x001133);
  gridHelper.material.transparent = true;
  gridHelper.material.opacity = 0.15;
  gridHelper.position.y = 0;
  scene.add(gridHelper);
}

// ========================================
//  AUDIO VISUALIZER
// ========================================
function buildVisualizer() {
  const container = document.getElementById('visualizer');
  for (let i = 0; i < 24; i++) {
    const bar = document.createElement('div');
    bar.className = 'viz-bar';
    bar.style.height = '4px';
    container.appendChild(bar);
  }
}

function updateVisualizer() {
  const bars = document.querySelectorAll('.viz-bar');
  const container = document.getElementById('visualizer');
  
  if (currentState === 'talking') {
    container.classList.add('active');
    bars.forEach((bar, i) => {
      const h = 4 + Math.sin(time * 8 + i * 0.5) * 15 + Math.random() * 10;
      bar.style.height = h + 'px';
    });
  } else {
    container.classList.remove('active');
  }
}

// ========================================
//  STATE MANAGEMENT
// ========================================
function setState(newState) {
  currentState = newState;
  
  // Update HUD
  document.body.className = `state-${newState}`;
  const statusText = document.getElementById('status-text');
  const statusMap = {
    idle: '● ONLINE',
    thinking: '◆ PROCESSING',
    talking: '◉ SPEAKING',
  };
  statusText.textContent = statusMap[newState] || '● ONLINE';

  // Update button states
  document.querySelectorAll('#bottom-bar button').forEach(b => b.classList.remove('active'));
  const btnMap = { idle: 'btn-idle', thinking: 'btn-think', talking: 'btn-talk' };
  const btn = document.getElementById(btnMap[newState]);
  if (btn) btn.classList.add('active');
}

// ========================================
//  ANIMATION LOOP
// ========================================
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  time += delta;

  // --- AVATAR IDLE: Floating bob ---
  const bobSpeed = currentState === 'thinking' ? 3 : 1.5;
  const bobAmp = currentState === 'thinking' ? 0.15 : 0.08;
  avatar.position.y = Math.sin(time * bobSpeed) * bobAmp;

  // Gentle body sway
  avatar.rotation.y = Math.sin(time * 0.3) * 0.05;

  // --- HEAD ---
  headGroup.rotation.y = Math.sin(time * 0.5) * 0.08;
  headGroup.rotation.x = Math.sin(time * 0.7) * 0.03;

  // --- CORE GLOW pulse ---
  const core = bodyGroup.getObjectByName('core');
  const coreGlow = bodyGroup.getObjectByName('coreGlow');
  if (core && coreGlow) {
    const pulse = 0.5 + 0.5 * Math.sin(time * 3);
    if (currentState === 'idle') {
      core.material.color.setHex(0x00ffff);
      coreGlow.material.opacity = 0.08 + pulse * 0.08;
      coreGlow.scale.setScalar(1 + pulse * 0.3);
    } else if (currentState === 'thinking') {
      core.material.color.setHex(0xffd700);
      coreGlow.material.color.setHex(0xffd700);
      coreGlow.material.opacity = 0.15 + pulse * 0.15;
      coreGlow.scale.setScalar(1.2 + pulse * 0.5);
    } else if (currentState === 'talking') {
      core.material.color.setHex(0xff66ff);
      coreGlow.material.color.setHex(0xff66ff);
      coreGlow.material.opacity = 0.1 + Math.abs(Math.sin(time * 8)) * 0.2;
      coreGlow.scale.setScalar(1 + Math.abs(Math.sin(time * 8)) * 0.5);
    }
  }

  // --- AURA RINGS ---
  auraRing.rotation.z = time * 0.5;
  const aura2 = bodyGroup.getObjectByName('aura2');
  if (aura2) aura2.rotation.z = -time * 0.3;

  if (currentState === 'thinking') {
    auraRing.material.opacity = 0.3 + Math.sin(time * 4) * 0.2;
    auraRing.material.color.setHex(0xffd700);
  } else if (currentState === 'talking') {
    auraRing.material.opacity = 0.2 + Math.abs(Math.sin(time * 6)) * 0.3;
    auraRing.material.color.setHex(0xff66ff);
  } else {
    auraRing.material.opacity = 0.2 + Math.sin(time * 2) * 0.1;
    auraRing.material.color.setHex(0x00ffff);
  }

  // --- ARM ANIMATION ---
  const armL = bodyGroup.getObjectByName('armL');
  const armR = bodyGroup.getObjectByName('armR');
  const forearmL = bodyGroup.getObjectByName('forearmL');
  const forearmR = bodyGroup.getObjectByName('forearmR');

  if (currentState === 'talking') {
    // Gesture while talking
    if (armR) armR.rotation.z = -0.15 + Math.sin(time * 3) * 0.15;
    if (forearmR) forearmR.rotation.x = -0.2 + Math.sin(time * 3.5) * 0.2;
    if (armL) armL.rotation.z = 0.15 + Math.sin(time * 2.5) * 0.08;
  } else if (currentState === 'thinking') {
    // Hand to chin thinking pose
    if (armR) armR.rotation.z = -0.3;
    if (forearmR) forearmR.rotation.x = -0.8 + Math.sin(time * 1.5) * 0.05;
  } else {
    // Idle breathing
    if (armL) armL.rotation.z = 0.15 + Math.sin(time * 1.2) * 0.03;
    if (armR) armR.rotation.z = -0.15 - Math.sin(time * 1.2) * 0.03;
    if (forearmL) forearmL.rotation.x = -0.2;
    if (forearmR) forearmR.rotation.x = -0.2;
  }

  // --- PLATFORM RINGS ---
  for (let i = 0; i < 3; i++) {
    const ring = platformGroup.getObjectByName(`platformRing${i}`);
    if (ring) {
      ring.rotation.z = time * (0.2 + i * 0.15) * (i % 2 === 0 ? 1 : -1);
      if (currentState === 'thinking') {
        ring.material.opacity = 0.4 + Math.sin(time * 3 + i) * 0.2;
      }
    }
  }

  // --- PARTICLES ---
  if (particles) {
    particles.rotation.y = time * 0.05;
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
      positions[i + 1] += Math.sin(time + i) * 0.001;
      if (positions[i + 1] > 7) positions[i + 1] = 0;
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // Particles react to state
    if (currentState === 'thinking') {
      particles.material.opacity = 0.9;
      particles.material.size = 0.06;
    } else if (currentState === 'talking') {
      particles.material.opacity = 0.7;
      particles.material.size = 0.05 + Math.abs(Math.sin(time * 5)) * 0.03;
    } else {
      particles.material.opacity = 0.4;
      particles.material.size = 0.04;
    }
  }

  // --- NEURAL WEB ---
  if (neuralWeb) {
    neuralWeb.rotation.y = time * 0.08;
    neuralWeb.children.forEach(child => {
      if (child.isMesh) {
        child.material.opacity = currentState === 'thinking' ? 
          0.5 + Math.sin(time * 5 + child.position.x * 3) * 0.3 : 0.2;
      }
    });
  }

  // --- CAMERA subtle movement ---
  camera.position.x = Math.sin(time * 0.15) * 0.3;
  camera.position.y = 2 + Math.sin(time * 0.2) * 0.15;
  camera.lookAt(0, 2, 0);

  // Update visualizer
  updateVisualizer();

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ========================================
//  KEYBOARD SHORTCUTS
// ========================================
document.addEventListener('keydown', (e) => {
  if (e.key === '1') setState('idle');
  if (e.key === '2') setState('thinking');
  if (e.key === '3') setState('talking');
});

// ========================================
//  EXTERNAL CONTROL (via postMessage)
// ========================================
window.addEventListener('message', (event) => {
  const data = event.data;
  if (data && data.state) {
    setState(data.state);
  }
});

// Init
init();
</script>
</body>
</html>

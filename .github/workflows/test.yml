name: Nexa Language CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (${{ matrix.os }} / Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install Nexa
        run: pip install -e .

      - name: Run v27 test suite
        run: python -m nexa_lang test test_v27.nexa
        env:
          PYTHONIOENCODING: utf-8

      - name: Run v26 regression tests
        run: python -m nexa_lang test test_v26.nexa
        env:
          PYTHONIOENCODING: utf-8

      - name: Run v25 regression tests
        run: python -m nexa_lang test test_v25_phase1.nexa
        env:
          PYTHONIOENCODING: utf-8

      - name: Smoke test CLI commands
        run: |
          python -m nexa_lang explain "let"
          python -m nexa_lang explain "result.ok"
          python -m nexa_lang build-vm --check
        env:
          PYTHONIOENCODING: utf-8

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install black mypy
      - run: black --check nexa_lang/
        continue-on-error: true   # warn but don't fail

  build-package:
    name: Build PyPI Package
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: nexa-dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-package
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nexa-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

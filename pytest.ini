[pytest]
testpaths = tests
python_files = test_*.py verify_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests requiring live services
    unit: marks fast isolated unit tests
